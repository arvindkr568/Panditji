name: Daily Pandit Ji Publisher

on:
  schedule:
    # Runs at 4:00 AM IST (Indian Standard Time) every day
    # IST is UTC+5:30. Therefore, 4:00 AM IST = 22:30 UTC (the previous day)
    - cron: '30 22 * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
        cache: 'pip'
        
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Configure API Secrets
      # We need to recreate the client_secrets.json and token.json from GitHub Secrets
      # because they are not checked into the public git repository for security.
      run: |
        echo '${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}' > client_secrets.json
        echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > token.json
        
    - name: Run Automated Pipeline
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
        META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
      run: |
        python automation.py
